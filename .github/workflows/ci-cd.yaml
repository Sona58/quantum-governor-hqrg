name: HQRG Production Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # PHASE 1: Quality Control
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.10'
      - name: Install Dependencies
        run: |
            python -m pip install --upgrade pip
            # Install requirements for all services to run unit tests
            pip install pytest fastapi uvicorn prometheus-client qiskit qiskit-aer nats-py redis
      - name: Python Unit Tests
        env:
            PYTHONPATH: .
        run: |
          pytest tests/unit/

  # PHASE 2: Artifact Creation
  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          container-runtime: docker
          cpus: 2
          memory: 4000m
      - name: Build Local Images in Minikube
        run: |
          # Point the shell to Minikube's Docker daemon
          eval $(minikube -p minikube docker-env)
          docker build -t gateway-api:latest ./services/gateway_api
          docker build -t risk-engine-qml:latest ./services/risk_engine_qml
          docker build -t cost-analyzer:latest ./services/cost_analyzer
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Deploy to Minikube
        working-directory: ./terraform
        env:
            TF_VAR_ibm_quantum_token: ${{ vars.IBM_QUANTUM_TOKEN }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Verify and Bootstrap NATS Stream
        run: |
          kubectl wait --for=condition=ready pod -l app=nats -n hqrg-core --timeout=90s
          # Use nats-box to create the stream from outside the nats pod
          kubectl run nats-bootstrap --rm -i --restart=Never --image=natsio/nats-box -n hqrg-core --overrides='{"spec":{"containers":[{"name":"nats-verify","image":"natsio/nats-box","resources":{"limits":{"cpu":"100m","memory":"128Mi"}}}]}}' -- \
          nats --server=nats-service:4222 str add QUANTUM --subjects "quantum.*" --storage file --retention limits --max-msgs=-1 --max-bytes=-1 --discard old --defaults

      - name: Run Integration Tests
        env:
            GATEWAY_URL: http://localhost:8080
            REDIS_HOST: localhost
            NATS_URL: nats://localhost:4222
        run: |
          # 1. Install specific test plugins
          pip install pytest pytest-asyncio requests redis nats-py
          
          # 2. Forward ALL necessary services to localhost
          kubectl port-forward service/gateway-api-service 8080:80 -n hqrg-core &
          kubectl port-forward service/redis-service 6379:6379 -n hqrg-core &
          kubectl port-forward service/nats-service 4222:4222 -n hqrg-core &
          
          # Give forwards a moment to establish
          sleep 10
          
          # 3. Run with python -m to fix pathing and include asyncio plugin
          python -m pytest tests/integration tests/e2e